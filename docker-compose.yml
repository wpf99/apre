services:
  apre-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apre.rule=Host(`apre.mxytzplk.org`)"
      - "traefik.http.routers.apre.entrypoints=websecure"
      - "traefik.http.routers.apre.tls.certresolver=letsencrypt"
      - "traefik.http.services.apre.loadbalancer.server.port=8000"
